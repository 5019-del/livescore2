<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Football Scoreboard - Perfect Symmetry</title>
    <style>
        /* RESET TIÊU CHUẨN */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: transparent; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
            color: white; 
        }

        /* KHUNG CHÍNH: Tạo độ bo góc nhẹ và bóng đổ chuyên nghiệp */
        .scoreboard { 
            display: flex; 
            background: #111; 
            border: 1px solid #333; 
            border-radius: 6px; 
            height: 65px; /* Giảm nhẹ chiều cao để trông thanh thoát hơn */
            align-items: center; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); 
            margin-top: 20px;
            overflow: hidden;
        }
        
        /* CÁC HỘP NỘI DUNG: Căn chỉnh lại độ rộng (width) để đối xứng tuyệt đối */
        .team-box { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 160px; /* Tăng độ rộng để tên đội không bị bó hẹp */
            height: 100%; 
            background: #1a1a1a; 
            position: relative;
        }

        /* Vạch màu đặc trưng ở hai đầu bảng điểm */
        .home { border-left: 5px solid #00a2ff; }
        .away { border-right: 5px solid #ff3030; }

        .name { 
            font-size: 24px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }
        
        /* HỘP TỈ SỐ: Cố định kích thước vuông vắn */
        .score { 
            background: #000; 
            font-size: 42px; 
            font-weight: bold; 
            width: 70px; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-left: 1px solid #222;
            border-right: 1px solid #222;
        }
        
        /* PHẦN THỜI GIAN: Trung tâm của bảng điểm */
        .timer-section { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 150px; 
            background: #0a0a0a; 
            height: 100%; 
        }

        .period { 
            color: #00ff00; 
            font-size: 13px; 
            font-weight: bold; 
            margin-bottom: -4px; 
            text-transform: uppercase; 
        }
        
        .time { 
            color: #ffcc00; 
            font-size: 42px; 
            font-weight: 700; 
            font-family: 'Arial Black', Arial, sans-serif;
            line-height: 1;
        }

        #denied { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; align-items: center; justify-content: center; font-size: 22px; z-index: 99; }
    </style>
</head>
<body>

    <div id="denied">❌ 404 - Truy cập bị từ chối</div>

    <div class="scoreboard" id="ui">
        <div class="team-box home">
            <div class="name" id="h-name">HOME</div>
        </div>
        <div class="score" id="h-score">0</div>

        <div class="timer-section">
            <div id="m-period" class="period">1ST</div>
            <div id="m-time" class="time">00:00</div>
        </div>

        <div class="score" id="a-score">0</div>
        <div class="team-box away">
            <div class="name" id="a-name">AWAY</div>
        </div>
    </div>

    <script>
        const SECRET_KEY = "fi6688";
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT_NhfT6-tsgA_tJjqhm9kDnR_PMc8uyuRCTSeexA5GT89wp3LW3jYMi0q2_qDfdCHTaUQ17NMWXuLR/pub?output=csv";

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') !== SECRET_KEY) {
            document.getElementById('denied').style.display = 'flex';
            document.getElementById('ui').style.display = 'none';
        }

        let totalSecs = 0;
        let lastSheetTimeValue = ""; 

        function renderTime() {
            let mins = Math.floor(totalSecs / 60);
            let secs = totalSecs % 60;
            document.getElementById('m-time').innerText = 
                (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
        }

        setInterval(() => {
            totalSecs++;
            renderTime();
        }, 1000);

        async function syncData() {
            try {
                const r = await fetch(CSV_URL);
                const data = await r.text();
                if (data.includes("<!DOCTYPE")) return;

                const rows = data.split('\n').map(row => row.includes(';') ? row.split(';') : row.split(','));

                document.getElementById('h-name').innerText = (rows[0][0] || "").trim();
                document.getElementById('h-score').innerText = (rows[0][1] || "0").trim();
                document.getElementById('a-name').innerText = (rows[1][0] || "").trim();
                document.getElementById('a-score').innerText = (rows[1][1] || "0").trim();
                document.getElementById('m-period').innerText = (rows[2][0] || "1ST").trim();

                let currentSheetTime = (rows[2][1] || "00:00").trim();
                
                if (currentSheetTime !== lastSheetTimeValue) {
                    let parts = currentSheetTime.split(':');
                    let sSecs = 0;
                    if (parts.length === 2) {
                        sSecs = parseInt(parts[0]) * 60 + parseInt(parts[1]);
                    } else if (parts.length === 3) {
                        sSecs = parseInt(parts[0]) * 3600 + parseInt(parts[1]) * 60 + parseInt(parts[2]);
                    }
                    totalSecs = sSecs;
                    lastSheetTimeValue = currentSheetTime; 
                    renderTime();
                }
            } catch (err) { }
        }

        setInterval(syncData, 3000);
        syncData();
    </script>
</body>
</html>
